<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI — Sistemas Institucionales</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #003399;
            --blue-light: #1a4db3;
            --gold: #FFCC00;
            --bg: #F5F5F7;
            --white: #FFFFFF;
            --text: #333333;
            --muted: #6b7280;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, .10), 0 4px 6px -2px rgba(0, 0, 0, .05);
            --shadow-h: 0 20px 30px -5px rgba(0, 51, 153, .20), 0 8px 12px -4px rgba(0, 51, 153, .12);
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --hdr-h: 64px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .hdr {
            background: var(--blue);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--hdr-h);
            box-shadow: 0 2px 10px rgba(0, 0, 0, .30);
        }

        .hdr-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hdr-castle {
            width: 49px;
            height: 49px;
            object-fit: contain;
        }

        .hdr-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .hdr-emi {
            color: var(--gold);
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 4px;
        }

        .hdr-full {
            color: rgba(255, 255, 255, .70);
            font-size: 10px;
            letter-spacing: 1.8px;
            text-transform: uppercase;
        }

        .hdr-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--blue-light);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hdr-avatar svg {
            width: 75%;
            height: 75%;
        }

        /* ── Page layout ── */
        .page-body {
            display: flex;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 32px;
            align-items: flex-start;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            position: sticky;
            top: calc(var(--hdr-h) + 12px);
        }

        .profile-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border-top: 4px solid var(--gold);
            text-align: center;
            margin-bottom: 12px;
        }

        .avatar-lg {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--blue-light);
            border: 3px solid var(--gold);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-lg svg {
            width: 75%;
            height: 75%;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .p-name {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .4px;
            line-height: 1.4;
            color: var(--text);
        }

        .p-email {
            font-size: 11px;
            color: var(--blue);
            text-decoration: none;
        }

        .p-email:hover {
            text-decoration: underline;
        }

        .p-unit {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 4px;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .7px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .badge-gold {
            background: var(--gold);
            color: #7a5f00;
        }

        .badge-grey {
            background: #e5e7eb;
            color: var(--muted);
        }

        /* ── Banner ── */
        .banner {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            font-size: 12px;
            color: var(--blue);
            letter-spacing: .3px;
        }

        .banner svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .banner strong {
            font-weight: 900;
        }

        /* ── Content ── */
        .content {
            flex: 1;
            min-width: 0;
        }

        /* ── Section header ── */
        .sec {
            margin-top: 0;
            margin-bottom: 32px;
        }

        .sec + .sec {
            margin-top: 8px;
        }

        .sec-hdr {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .sec-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold));
        }

        .sec-line.rev {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .sec-title {
            font-size: 13px;
            font-weight: 900;
            color: var(--blue);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* ── Card ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .18s ease, box-shadow .18s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .22s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-h);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-hdr {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 9px;
        }

        .card-sigla {
            font-size: 26px;
            font-weight: 900;
            color: var(--blue);
            letter-spacing: 1px;
            line-height: 1;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            object-fit: contain;
        }

        .card-div {
            width: 60px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 11px;
            font-weight: 600;
            color: var(--blue);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: .6px;
            line-height: 1.55;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 22px 16px;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .5px;
            border-top: 1px solid #e5e7eb;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .hdr-full { display: none; }

            .page-body {
                flex-direction: column;
                padding: 12px;
            }

            .sidebar {
                width: 100%;
                position: static;
            }

            .profile-card {
                flex-direction: row;
                text-align: left;
                align-items: center;
            }

            .badges { justify-content: flex-start; }
        }
    </style>
</head>

<body>

    <header class="hdr">
        <div class="hdr-brand">
            <img src="castillo.png" alt="EMI" class="hdr-castle">
            <div class="hdr-text">
                <span class="hdr-emi">EMI</span>
                <span class="hdr-full">Escuela Militar de Ingeniería</span>
            </div>
        </div>
        <div class="hdr-avatar">
            <svg viewBox="0 0 32 32" fill="none">
                <circle cx="16" cy="11" r="6" fill="#FFCC00" />
                <path d="M4 28c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#FFCC00" />
            </svg>
        </div>
    </header>

    <div class="page-body">

        <!-- ── Sidebar izquierdo ── -->
        <aside class="sidebar">
            <div class="profile-card">
                <div class="avatar-lg">
                    <svg viewBox="0 0 64 64" fill="none">
                        <circle cx="32" cy="22" r="13" fill="#FFCC00" />
                        <path d="M6 58c0-14.359 11.640-26 26-26s26 11.641 26 26" fill="#FFCC00" />
                    </svg>
                </div>
                <div class="profile-info">
                    <p class="p-name">Teniente Coronel Juan Pérez Mamani</p>
                    <a href="mailto:jperez@emi.edu.bo" class="p-email">jperez@emi.edu.bo</a>
                    <p class="p-unit">Unidad Académica La Paz</p>
                    <div class="badges">
                        <span class="badge badge-gold">CARRERAS DE GRADO</span>
                        <span class="badge badge-grey">JEFE DE DEPARTAMENTO</span>
                    </div>
                </div>
            </div>

            <div class="banner">
                <svg viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="9" stroke="#003399" stroke-width="1.5" />
                    <rect x="9" y="8" width="2" height="6" rx="1" fill="#003399" />
                    <circle cx="10" cy="6" r="1" fill="#003399" />
                </svg>
                Asignados: <strong>&nbsp;7 sistemas</strong>
            </div>
        </aside>

        <!-- ── Contenido principal ── -->
        <div class="content">
            <section class="sec">
                <div class="sec-hdr">
                    <div class="sec-line"></div>
                    <h2 class="sec-title">Sistemas Académicos</h2>
                    <div class="sec-line rev"></div>
                </div>
                <div class="grid" id="grid-acad"></div>
            </section>

            <section class="sec">
                <div class="sec-hdr">
                    <div class="sec-line"></div>
                    <h2 class="sec-title">Sistemas Administrativos</h2>
                    <div class="sec-line rev"></div>
                </div>
                <div class="grid" id="grid-admin"></div>
            </section>
        </div>

    </div>

    <footer>© 2026 EMI — Escuela Militar de Ingeniería</footer>

    <script>
        const academicos = [
            { sigla: 'RDC', nombre: 'Registro del Diseño Curricular' },
            { sigla: 'RGA', nombre: 'Registro y Gestión Académico' },
            { sigla: 'IGA-G', nombre: 'Información de Gestión Académica' },
            { sigla: 'RDG', nombre: 'Registro de Defensas de Grado' },
        ];

        const administrativos = [
            { sigla: 'POA', nombre: 'Programación Operativa Anual 2026' },
            { sigla: 'SGF', nombre: 'Sistema de Gestión Financiera' },
            { sigla: 'SGRH', nombre: 'Sistema de Gestión de Recursos Humanos' },
        ];

        function buildCard(s) {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
    <div class="card-hdr">
      <span class="card-sigla">${s.sigla}</span>
      <img src="castillo.png" alt="EMI" class="card-icon">
    </div>
    <div class="card-div"></div>
    <p class="card-desc">${s.nombre}</p>`;
            d.addEventListener('click', () => console.log('Abriendo:', s.sigla));
            return d;
        }

        document.getElementById('grid-acad').replaceChildren(...academicos.map(buildCard));
        document.getElementById('grid-admin').replaceChildren(...administrativos.map(buildCard));
    </script>
</body>

</html>
